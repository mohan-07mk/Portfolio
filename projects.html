<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects – MohanKumar M Portfolio</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#040b14;--bg2:#070f1a;--bg3:#0a1525;
  --surface:rgba(8,20,40,0.85);--cyan:#00d4ff;--blue:#0066ff;--accent:#00ffcc;
  --text:#eaf4ff;--text2:#b0d0ee;--text3:#7aa5c8;
  --border:rgba(0,212,255,0.15);--border2:rgba(0,212,255,0.3);
  --glow:0 0 20px rgba(0,212,255,0.3);
  --font-display:'Orbitron',monospace;--font-body:'Space Grotesk',sans-serif;--font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:3px}

/* Light theme */
body.light {
  --bg: #f8fafc;
  --bg2: #f1f5f9;
  --bg3: #e2e8f0;
  --surface: rgba(255,255,255,0.85);
  --text: #0f172a;
  --text2: #475569;
  --text3: #64748b;
  --border: rgba(15,23,42,0.06);
  --border2: rgba(15,23,42,0.12);
  --cyan: #0284c7;
  --blue: #2563eb;
  --accent: #0d9488;
}
body.light .project-card { background:rgba(255,255,255,0.92); }
body.light .back-btn { background:rgba(240,244,248,0.9); }
body.light .page-header { background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,102,255,0.08) 0%,transparent 70%); }

.top-bar {
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;backdrop-filter:blur(10px);
  background:rgba(4,11,20,0.8);border-bottom:1px solid var(--border);
}
body.light .top-bar { background:rgba(240,244,248,0.9); }

.page-header{
  padding:100px 5vw 60px;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,102,255,0.15) 0%,transparent 70%);
  text-align:center;
  border-bottom:1px solid var(--border);
}
.section-label{font-family:var(--font-mono);font-size:12px;color:var(--cyan);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:10px}
.section-label::before,.section-label::after{content:'';width:24px;height:1px;background:var(--cyan)}
.page-title{font-family:var(--font-display);font-size:clamp(28px,4vw,48px);font-weight:900;line-height:1.1;margin-bottom:12px;background:linear-gradient(135deg,#fff 30%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
body.light .page-title{background:linear-gradient(135deg,#0d1b2e 30%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-sub{font-size:16px;color:var(--text2);max-width:560px;margin:0 auto}

.projects-section{padding:60px 5vw;max-width:1300px;margin:0 auto}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:36px;justify-content:center}
.filter-btn{font-size:13px;font-weight:500;padding:7px 18px;border-radius:50px;cursor:pointer;transition:0.3s;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font-body)}
.filter-btn:hover,.filter-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.08)}

.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
.project-card{
  background:var(--surface);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:20px;
  overflow:hidden;transition:0.3s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;
}
.project-card:hover{border-color:var(--border2);box-shadow:var(--glow);transform:translateY(-6px)}
.project-card.featured{border-color:rgba(0,102,255,0.4);grid-column:span 2}
.project-img{
  width:100%;height:200px;
  background:linear-gradient(135deg,var(--bg3),var(--bg2));
  display:flex;align-items:center;justify-content:center;
  font-size:56px;position:relative;overflow:hidden;
}
.project-card.featured .project-img{height:260px}
.project-img img{width:100%;height:100%;object-fit:cover}
.project-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,transparent 50%);
  pointer-events:none;
}
.project-status{
  position:absolute;top:14px;right:14px;
  font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  padding:4px 10px;border-radius:50px;font-family:var(--font-mono);
  backdrop-filter:blur(10px);
}
.status-live{background:rgba(0,255,150,0.15);color:#00ff96;border:1px solid rgba(0,255,150,0.3)}
.status-wip{background:rgba(255,200,0,0.15);color:#ffc800;border:1px solid rgba(255,200,0,0.3)}
.status-done{background:rgba(0,212,255,0.15);color:var(--cyan);border:1px solid var(--border2)}

.project-body{padding:22px;flex:1;display:flex;flex-direction:column}
.project-category{font-family:var(--font-mono);font-size:11px;color:var(--cyan);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px}
.project-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.3}
.project-desc{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:16px;flex:1}
.project-tech{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.tech-tag{font-family:var(--font-mono);font-size:11px;padding:3px 10px;border-radius:6px;background:rgba(0,102,255,0.1);color:#7aaeff;border:1px solid rgba(0,102,255,0.2)}
.project-actions{display:flex;gap:8px;margin-top:auto}
.proj-btn{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:0.3s;border:1px solid;text-align:center;font-family:var(--font-body);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.proj-btn-demo{border-color:transparent;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff}
.proj-btn-demo:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,102,255,0.4)}
.proj-btn-code{border-color:var(--border2);color:var(--cyan);background:transparent}
.proj-btn-code:hover{background:rgba(0,212,255,0.08)}

.featured-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;letter-spacing:0.1em;
  background:linear-gradient(135deg,rgba(0,102,255,0.2),rgba(0,212,255,0.2));
  border:1px solid rgba(0,212,255,0.3);
  border-radius:50px;padding:3px 12px;color:var(--cyan);
  margin-bottom:8px;font-family:var(--font-mono);
}

.project-stats{display:flex;gap:16px;margin-bottom:14px}
.pstat{text-align:center}
.pstat-num{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--cyan)}
.pstat-label{font-size:10px;color:var(--text3);font-family:var(--font-mono);letter-spacing:0.06em}

.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--text2);
  text-decoration:none;padding:8px 16px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  transition:0.3s;cursor:pointer;font-family:var(--font-body);
}
.back-btn:hover{border-color:var(--cyan);color:var(--cyan)}

.theme-btn{
  background:var(--surface);border:1px solid var(--border);color:var(--text2);
  width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:0.3s;
}
.theme-btn:hover{border-color:var(--cyan);color:var(--cyan)}

.reveal{opacity:0;transform:translateY(24px);transition:opacity 0.6s,transform 0.6s}
.reveal.visible{opacity:1;transform:none}

@media(max-width:768px){
  .projects-grid{grid-template-columns:1fr}
  .project-card.featured{grid-column:span 1}
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">← Back to Portfolio</a>
  <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode">🌙</button>
</div>

<div class="page-header">
  <div class="section-label">Engineering Work</div>
  <h1 class="page-title">Projects Showcase</h1>
  <p class="page-sub">A collection of embedded systems, IoT, and electronics projects built with passion and precision</p>
</div>

<div class="projects-section">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterProjects('all',this)">All</button>
    <button class="filter-btn" onclick="filterProjects('embedded',this)">Embedded</button>
    <button class="filter-btn" onclick="filterProjects('iot',this)">IoT</button>
    <button class="filter-btn" onclick="filterProjects('vlsi',this)">VLSI</button>
    <button class="filter-btn" onclick="filterProjects('automation',this)">Automation</button>
    <button class="filter-btn" onclick="filterProjects('robotics',this)">Robotics</button>
  </div>
  <div class="projects-grid" id="projects-grid"></div>
</div>

<script>
// Default projects (fallback)
const defaultProjects = [
  {id:1,cat:'iot',featured:true,status:'live',icon:'💧',title:'AI-Powered Smart Irrigation System',desc:'An intelligent irrigation controller using ESP32, soil moisture sensors, and a TensorFlow Lite model to predict optimal watering schedules. Integrates with MQTT broker for remote monitoring via mobile app. Reduced water usage by 38% in pilot testing with Tamil Nadu Agricultural Department.',tech:['ESP32','TensorFlow Lite','MQTT','Python','SQLite','React Native'],demo:'#',code:'https://github.com/',stats:[{num:'38%',label:'Water Saved'},{num:'97%',label:'Accuracy'},{num:'6',label:'Sensors'}],img:null},
  {id:2,cat:'embedded',featured:false,status:'done',icon:'🏥',title:'Low-Power ECG Signal Processor',desc:'A wearable-grade ECG acquisition and processing system built on ARM Cortex-M4. Implements a real-time Pan-Tompkins QRS detection algorithm in embedded C.',tech:['ARM Cortex-M4','Embedded C','DSP','Keil MDK','KiCad'],demo:'#',code:'https://github.com/',stats:[{num:'72h',label:'Battery'},{num:'98.4%',label:'Detection'},{num:'12-lead',label:'ECG'}],img:null},
  {id:3,cat:'automation',featured:false,status:'live',icon:'⚡',title:'Smart Grid Fault Detection System',desc:'Real-time grid fault detection using Arduino Mega with CT sensors and voltage dividers. Implements FFT-based harmonic analysis to classify fault types.',tech:['Arduino Mega','FFT','CT Sensors','SD Card','LCD','Relay Control'],demo:'#',code:'https://github.com/',stats:[{num:'<5ms',label:'Response'},{num:'99.1%',label:'Accuracy'},{num:'24/7',label:'Monitor'}],img:null},
  {id:4,cat:'robotics',featured:false,status:'done',icon:'🤖',title:'Autonomous Line-Following Robot',desc:'A PID-controlled line follower using IR sensor array and L298N motor driver. Achieved 1st place at the National Robotics Competition 2023.',tech:['ATmega328','PID Control','IR Array','L298N','Embedded C++'],demo:'#',code:'https://github.com/',stats:[{num:'1st',label:'Place'},{num:'1.8 m/s',label:'Speed'},{num:'PID',label:'Control'}],img:null},
  {id:5,cat:'iot',featured:false,status:'wip',icon:'🏠',title:'Smart Home Automation Hub',desc:'A centralized home automation controller using Raspberry Pi 4 as the hub, ESP8266 nodes for peripheral control.',tech:['Raspberry Pi 4','ESP8266','Node-RED','Google Assistant','MQTT','React'],demo:'#',code:'https://github.com/',stats:[{num:'12',label:'Devices'},{num:'Wi-Fi',label:'Protocol'},{num:'REST',label:'API'}],img:null},
  {id:6,cat:'vlsi',featured:false,status:'done',icon:'🔬',title:'4-bit ALU on FPGA (Verilog)',desc:'A fully synthesized 4-bit Arithmetic Logic Unit implemented in Verilog HDL on Xilinx Spartan-6 FPGA.',tech:['Verilog HDL','Xilinx ISE','Spartan-6','ModelSim','Testbench'],demo:'#',code:'https://github.com/',stats:[{num:'12',label:'Operations'},{num:'100%',label:'Coverage'},{num:'50MHz',label:'Clock'}],img:null},
  {id:7,cat:'embedded',featured:false,status:'done',icon:'📡',title:'LoRa-based Long-Range Sensor Network',desc:'A LoRaWAN sensor network for remote agricultural land monitoring over 5 km range.',tech:['ESP32','LoRa SX1276','LoRaWAN','ThingSpeak','Node.js','Python'],demo:'#',code:'https://github.com/',stats:[{num:'5 km',label:'Range'},{num:'6',label:'Nodes'},{num:'<10mA',label:'Sleep'}],img:null},
  {id:8,cat:'automation',featured:false,status:'wip',icon:'☀️',title:'Solar MPPT Charge Controller',desc:'A microcontroller-based MPPT charge controller using Perturb & Observe algorithm with 93% tracking efficiency.',tech:['STM32','MPPT P&O','Buck-Boost','KiCad PCB','Gate Driver','ADC'],demo:'#',code:'https://github.com/',stats:[{num:'93%',label:'Efficiency'},{num:'50W',label:'Power'},{num:'KiCad',label:'PCB'}],img:null}
];

// Load projects from LocalStorage (synced from admin panel)
function loadProjects() {
  try {
    const saved = localStorage.getItem('mk_portfolio_v2');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.projects && data.projects.length > 0) return data.projects;
    }
  } catch(e) {}
  return defaultProjects;
}

let projects = loadProjects();

// Firebase real-time project synchronization
if (isFirebaseConfigured()) {
  db.collection('projects').onSnapshot(snapshot => {
    const list = [];
    snapshot.forEach(doc => {
      list.push(doc.data());
    });
    if (list.length > 0) {
      projects = list.sort((a, b) => (a.id || 0) - (b.id || 0));
      // Render projects using the active filter or default to 'all'
      const activeFilterBtn = document.querySelector('.filter-btn.active');
      const activeFilter = activeFilterBtn ? activeFilterBtn.textContent.toLowerCase() : 'all';
      renderProjects(activeFilter === 'all' ? 'all' : activeFilter);
    }
  }, error => {
    console.error("Error loading projects from Firestore:", error);
  });
}

function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderProjects(filter='all') {
  const grid = document.getElementById('projects-grid');
  const items = filter === 'all' ? projects : projects.filter(p => p.cat === filter);
  grid.innerHTML = items.map(p => `
    <div class="project-card ${p.featured ? 'featured' : ''} reveal" data-cat="${p.cat}">
      <div class="project-img">
        ${p.img ? `<img src="${p.img}" alt="${escHtml(p.title)}">` : `<span style="position:relative;z-index:1">${p.icon||'🔬'}</span>`}
        <div class="project-img-overlay"></div>
        <div class="project-status status-${p.status}">${{live:'● Live',wip:'⟳ In Progress',done:'✓ Completed'}[p.status]||p.status}</div>
      </div>
      <div class="project-body">
        ${p.featured ? '<div class="featured-badge">⭐ Featured Project</div>' : ''}
        <div class="project-category">${escHtml((p.cat||'').toUpperCase())}</div>
        <div class="project-title">${escHtml(p.title)}</div>
        <div class="project-desc">${escHtml(p.desc||'')}</div>
        ${(p.stats&&p.stats.length) ? `<div class="project-stats">${p.stats.map(s => `<div class="pstat"><div class="pstat-num">${escHtml(s.num)}</div><div class="pstat-label">${escHtml(s.label)}</div></div>`).join('')}</div>` : ''}
        <div class="project-tech">${(p.tech||[]).map(t => `<span class="tech-tag">${escHtml(t)}</span>`).join('')}</div>
        <div class="project-actions">
          <a href="${escHtml(p.demo||'#')}" class="proj-btn proj-btn-demo" target="_blank" rel="noopener">🚀 Live Demo</a>
          <a href="${escHtml(p.code||'#')}" class="proj-btn proj-btn-code" target="_blank" rel="noopener">⌥ GitHub</a>
        </div>
      </div>
    </div>
  `).join('');
  setTimeout(checkReveal, 100);
}

function filterProjects(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProjects(cat);
}

function checkReveal() {
  document.querySelectorAll('.reveal').forEach(el => {
    if (el.getBoundingClientRect().top < window.innerHeight - 60) el.classList.add('visible');
  });
}
window.addEventListener('scroll', checkReveal);

// Theme sync
function loadTheme() {
  if (localStorage.getItem('mk_theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-toggle').textContent = '☀️';
  }
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-toggle').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('mk_theme', isLight ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', () => {
  loadTheme();
  renderProjects();
  setTimeout(checkReveal, 100);
});
</script>
</body>
</html>
